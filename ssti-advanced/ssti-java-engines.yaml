id: ssti-java-template-engines-detection

info:
  name: SSTI - Java Template Engine Detection (Thymeleaf / FreeMarker / Velocity / Pebble)
  author: achraf-chehboun
  severity: critical
  description: |
    Precision detection for Server-Side Template Injection in Java enterprise stacks.
    Targets Thymeleaf (Spring Boot default), FreeMarker, Apache Velocity, and Pebble.
    Uses canary-wrapped payloads and baseline differentials to eliminate false positives.
    Canary pattern ensures the computed result only matches if genuine evaluation occurred.
  reference:
    - https://portswigger.net/research/server-side-template-injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-1336
  metadata:
    max-request: 18
  tags: ssti,thymeleaf,freemarker,velocity,pebble,java,spring-boot,detection-only

http:
  # === THYMELEAF (Spring Boot) ===
  # Preprocessor expression: __${expr}__ with baseline comparison
  - raw:
      - |
        GET /?name=thymeleaf_baseline_xnlbz HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=__${267*269}__::x HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: thymeleaf-preprocessor-ssti
        dsl:
          - '!contains(body_1, "71823") && contains(body_2, "71823") && !contains(body_2, "__${")'

  # Thymeleaf fragment expression injection
  - raw:
      - |
        GET /?fragment=thymeleaf_baseline_xnlbz HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?fragment=__${T(java.lang.Math).abs(-71589)}__::x HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: thymeleaf-fragment-ssti
        dsl:
          - '!contains(body_1, "71589") && contains(body_2, "71589")'

  # Thymeleaf via path variable (Spring MVC pattern)
  - raw:
      - |
        GET /thymeleaf_baseline_xnlbz HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /__${267*269}__::x HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: thymeleaf-path-ssti
        dsl:
          - '!contains(body_1, "71823") && contains(body_2, "71823")'

  # Thymeleaf SpEL class name leak
  - raw:
      - |
        GET /?view=thymeleaf_baseline_xnlbz HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?view=__${T(java.lang.Runtime).getRuntime().getClass().getName()}__ HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: thymeleaf-spel-class-leak
        dsl:
          - '!contains(body_1, "java.lang.Runtime") && contains(body_2, "java.lang.Runtime")'

  # === FREEMARKER ===
  # Canary-wrapped expression: xnlbz${267*269}qwfkj
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz${267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: freemarker-expr-ssti
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  - raw:
      - |
        GET /?template=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?template=xnlbz${267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: freemarker-template-param-ssti
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # FreeMarker string concat confirmation
  - raw:
      - |
        GET /?name=${"fr" + "eemarker" + 267?string} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: freemarker-string-concat
        words:
          - "freemarker267"
        part: body

  # FreeMarker year leak via .now
  - raw:
      - |
        GET /?name=xnlbz${.now?string("yyyy")}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: regex
        name: freemarker-builtin-leak
        regex:
          - 'xnlbz20[2-9][0-9]qwfkj'
        part: body

  # === APACHE VELOCITY ===
  # Velocity conditional with unique sentinel
  - raw:
      - |
        GET /?name=#if(267*269==71823)VELOCITY_SSTI_XNLBZ#end HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: velocity-conditional
        words:
          - "VELOCITY_SSTI_XNLBZ"
        part: body

  # Velocity #set + evaluation with canary
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=#set($x=267*269)xnlbz${x}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: velocity-set-eval
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Velocity class introspection
  - raw:
      - |
        GET /?name=$class.inspect("java.lang.Math").type.getName() HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "java.lang.Math"
        part: body
      - type: dsl
        dsl:
          - '!contains(body, "$class.inspect")'

  # === PEBBLE ===
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz{{ 267 * 269 }}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: pebble-expr-ssti
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Pebble string filter confirmation
  - raw:
      - |
        GET /?name={{ "pebblexnlbz" | upper }} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: pebble-filter-ssti
        words:
          - "PEBBLEXNLBZ"
        part: body

    extractors:
      - type: regex
        name: template-errors
        group: 0
        regex:
          - '(?i)((?:FreeMarker|Thymeleaf|Velocity|Pebble|SpEL)[\w\s.]*(?:Error|Exception|template)[^<\n]{0,300})'
          - '(?i)(org\.(?:thymeleaf|freemarker|apache\.velocity|mitchellbosecke\.pebble)\.[^<\n]{0,200})'
