id: laravel-critical-exposures

info:
  name: Laravel Critical Exposures - Ignition / Telescope / Horizon / Log Viewer
  author: achraf-chehboun
  severity: critical
  description: |
    Detects critical Laravel framework exposures including Ignition/Whoops debug pages,
    Laravel Telescope/Horizon/Log Viewer dashboards, APP_KEY leakage, and CVE-2021-3129.
    All matchers require Laravel/Ignition-specific content in responses — no false positives
    from generic 200 OK or catch-all routes.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-3129
    - https://www.ambionics.io/blog/laravel-debug-rce
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-94
  metadata:
    max-request: 16
  tags: laravel,ignition,telescope,horizon,cve-2021-3129,php,detection-only

http:
  # === IGNITION DEBUG PAGE ===
  - method: GET
    path:
      - "{{BaseURL}}/_ignition/health-check"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: ignition-health-check
        dsl:
          - 'contains(body, "can_execute_commands") && contains(content_type, "json")'

    extractors:
      - type: regex
        name: ignition-version
        group: 0
        regex:
          - '"laravelVersion"\s*:\s*"[^"]*"'

  # Ignition execute-solution endpoint (CVE-2021-3129)
  - raw:
      - |
        POST /_ignition/execute-solution HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"solution":"Facade\\Ignition\\Solutions\\MakeViewVariableOptionalSolution","parameters":{"variableName":"nuclei_test","viewFile":""}}

    matchers-condition: or
    matchers:
      - type: dsl
        name: ignition-rce-endpoint-open
        dsl:
          - 'status_code == 500 && (contains(body, "Ignition") || contains(body, "file_get_contents") || contains(body, "ViewException") || contains(body, "Facade\\\\Ignition"))'
          - 'status_code == 200 && contains(content_type, "json") && (contains(body, "Ignition") || contains(body, "solution") || contains(body, "can_execute_commands"))'
        condition: or

  # CVE-2021-3129: log access via filter chain
  - raw:
      - |
        POST /_ignition/execute-solution HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"solution":"Facade\\Ignition\\Solutions\\MakeViewVariableOptionalSolution","parameters":{"variableName":"x","viewFile":"php://filter/convert.base64-encode/resource=../storage/logs/laravel.log"}}

    matchers:
      - type: dsl
        name: cve-2021-3129-log-access
        dsl:
          - '(status_code == 200 || status_code == 500) && (contains(body, "base64") || contains(body, "ViewException") || contains(body, "Ignition") || contains(body, "file_get_contents")) && !contains(body, "<html") && !contains(body, "Route not found")'

  # Debug page with APP_KEY extraction
  - method: GET
    path:
      - "{{BaseURL}}/nonexistent-{{randstr}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 500

      - type: dsl
        name: laravel-debug-appkey-leak
        dsl:
          - '(contains(body, "Whoops") || contains(body, "Ignition") || contains(body, "StackTrace")) && (contains(body, "APP_KEY") || contains(body, "DB_PASSWORD") || contains(body, "APP_DEBUG"))'

    extractors:
      - type: regex
        name: app-key
        group: 1
        regex:
          - 'APP_KEY["\s:=]+\s*["\x27]?(base64:[A-Za-z0-9+/=]{44})["\x27]?'
      - type: regex
        name: db-credentials
        group: 0
        regex:
          - '(?i)DB_(?:HOST|DATABASE|USERNAME|PASSWORD)["\s:=]+\s*["\x27]?[^\s<"=\x27]{1,100}'

  # === LARAVEL TELESCOPE ===
  - method: GET
    path:
      - "{{BaseURL}}/telescope"
      - "{{BaseURL}}/telescope/requests"

    stop-at-first-match: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: telescope-dashboard-open
        dsl:
          - 'contains(body, "Laravel Telescope") || (contains(body, "telescope") && contains(body, "requests") && contains(body, "exceptions"))'

  # Telescope API
  - method: GET
    path:
      - "{{BaseURL}}/telescope/telescope-api/requests"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: telescope-api-data-leak
        dsl:
          - 'contains(content_type, "json") && contains(body, "\"entries\"") && len(body) > 100'

  # === LARAVEL HORIZON ===
  - method: GET
    path:
      - "{{BaseURL}}/horizon"
      - "{{BaseURL}}/horizon/api/stats"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: horizon-dashboard-open
        dsl:
          - 'status_code == 200 && contains(body, "Laravel Horizon")'

      - type: dsl
        name: horizon-api-data
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"wait\"") && (contains(body, "\"processes\"") || contains(body, "\"status\""))'

  # === LOG VIEWER ===
  - method: GET
    path:
      - "{{BaseURL}}/log-viewer"
      - "{{BaseURL}}/log-viewer/api/logs"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: log-viewer-open
        dsl:
          - 'status_code == 200 && contains(body, "Log Viewer") && (contains(body, "log-viewer") || contains(body, "laravel"))'

      - type: dsl
        name: log-api-data
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"logs\"") && contains(body, "\"level\"")'
