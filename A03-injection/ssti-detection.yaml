id: ssti-multi-engine-detection

info:
  name: Server-Side Template Injection - Multi-Engine Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects Server-Side Template Injection (SSTI) across multiple template engines
    using canary-wrapped arithmetic payloads that produce globally unique result strings.
    Uses two-request differential (baseline vs probe) to eliminate false positives from
    pages that naturally contain common numbers. The canary pattern "xnlbz71823qwfkj"
    will never appear in legitimate HTML/JSON content.
  reference:
    - https://owasp.org/Top10/A03_2021-Injection/
    - https://portswigger.net/web-security/server-side-template-injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-1336
  metadata:
    max-request: 18
  tags: owasp-top10,injection,ssti,template-injection,detection-only

http:
  # Jinja2/Twig — {{267*269}} should render as 71823 sandwiched between canaries
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz{{267*269}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: jinja2-twig-param-name
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'
        condition: and

  - raw:
      - |
        GET /?q=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q=xnlbz{{267*269}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: jinja2-twig-param-q
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  - raw:
      - |
        GET /?template=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?template=xnlbz{{267*269}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: jinja2-twig-param-template
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Jinja2 string multiplication differentiator — {{7*'7'}} = "7777777" in Jinja2
  - raw:
      - |
        GET /?name=xnlbz{{7*'7'}}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: or
    matchers:
      - type: word
        name: jinja2-string-multiply
        words:
          - "xnlbz7777777qwfkj"
        part: body

      - type: word
        name: twig-arithmetic
        words:
          - "xnlbz49qwfkj"
        part: body

  # FreeMarker (Java) — ${267*269}
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz${267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: freemarker-confirmed
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Thymeleaf (Spring) — preprocessor expression __${expr}__
  - raw:
      - |
        GET /?name=nonexistent_baseline_xnlbz HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=__${267*269}__::x HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: thymeleaf-confirmed
        dsl:
          - '!contains(body_1, "71823") && contains(body_2, "71823") && !contains(body_2, "__${267")'

  # ERB (Ruby) — <%%= 267*269 %>
  - raw:
      - |
        GET /?name=xnlbz9999999qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?name=xnlbz<%25%3d+267*269+%25>qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers:
      - type: dsl
        name: erb-confirmed
        dsl:
          - '!contains(body_1, "xnlbz71823qwfkj") && contains(body_2, "xnlbz71823qwfkj")'

  # Pug/Jade (Node.js) — #{267*269}
  - raw:
      - |
        GET /?name=xnlbz#{267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: pug-jade-confirmed
        words:
          - "xnlbz71823qwfkj"
        part: body

  # Smarty (PHP) — {267*269}
  - raw:
      - |
        GET /?name=xnlbz{267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: smarty-confirmed
        words:
          - "xnlbz71823qwfkj"
        part: body

  # Expression Language (Java EE) — ${267*269}
  - raw:
      - |
        GET /?name=xnlbz%24%7B267*269%7Dqwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: el-injection-confirmed
        words:
          - "xnlbz71823qwfkj"
        part: body

    extractors:
      - type: regex
        name: template-engine-error
        group: 0
        regex:
          - '(?i)((?:jinja2|twig|freemarker|thymeleaf|mako|pug|jade|smarty|handlebars|mustache|erb|velocity|pebble)[\w\s.]*(?:error|exception|template)[^<\n]{0,200})'
