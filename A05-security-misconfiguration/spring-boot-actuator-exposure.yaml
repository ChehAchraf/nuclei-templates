id: spring-boot-actuator-comprehensive

info:
  name: Spring Boot Actuator - Comprehensive Endpoint Exposure
  author: achraf-chehboun
  severity: high
  description: |
    Detects exposed Spring Boot Actuator endpoints (1.x and 2.x+). Actuator endpoints
    leak environment variables, database credentials, heap dumps, and application config.
    Each matcher requires actuator-specific JSON structure — not just status 200. This
    eliminates false positives from catch-all routes and generic error pages.
  reference:
    - https://docs.spring.io/spring-boot/docs/current/reference/html/actuator.html
    - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-16
    cpe: cpe:2.3:a:pivotal_software:spring_boot:*:*:*:*:*:*:*:*
  metadata:
    max-request: 20
    shodan-query: http.favicon.hash:116323821
    fofa-query: app="Spring-Boot"
  tags: owasp-top10,misconfig,spring,spring-boot,actuator,exposure

http:
  # Actuator index (JSON with _links)
  - method: GET
    path:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/manage/actuator"
      - "{{BaseURL}}/management/actuator"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: actuator-index
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"_links\"") && contains(body, "\"self\"")'

  # /env with strict content matching
  - method: GET
    path:
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/env"
      - "{{BaseURL}}/..;/actuator/env"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: env-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"propertySources\"") && (contains(body, "systemProperties") || contains(body, "spring.datasource") || contains(body, "applicationConfig"))'

    extractors:
      - type: regex
        name: datasource-urls
        group: 1
        regex:
          - '"spring\.datasource\.url"\s*:\s*\{\s*"value"\s*:\s*"([^"]+)"'

  # /configprops (requires Spring-specific JSON structure)
  - method: GET
    path:
      - "{{BaseURL}}/actuator/configprops"
      - "{{BaseURL}}/configprops"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: configprops-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && (contains(body, "\"contexts\"") || contains(body, "\"beans\"")) && (contains(body, "\"prefix\"") || contains(body, "\"properties\""))'

  # /mappings (Spring MVC handler mappings)
  - method: GET
    path:
      - "{{BaseURL}}/actuator/mappings"
      - "{{BaseURL}}/mappings"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: mappings-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && (contains(body, "dispatcherServlets") || contains(body, "\"handler\"") || contains(body, "\"predicate\""))'

  # /heapdump (binary, requires large size)
  - method: GET
    path:
      - "{{BaseURL}}/actuator/heapdump"
      - "{{BaseURL}}/heapdump"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: heapdump-exposure
        dsl:
          - '(contains(content_type, "octet-stream") || contains(content_type, "x-heap")) && len(body) > 50000'

  # /httptrace (request/response history)
  - method: GET
    path:
      - "{{BaseURL}}/actuator/httptrace"
      - "{{BaseURL}}/trace"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: httptrace-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"traces\"") && contains(body, "\"timestamp\"") && contains(body, "\"request\"")'

  # /beans, /threaddump, /loggers, /metrics, /scheduledtasks
  - method: GET
    path:
      - "{{BaseURL}}/actuator/beans"
      - "{{BaseURL}}/actuator/threaddump"
      - "{{BaseURL}}/actuator/loggers"
      - "{{BaseURL}}/actuator/metrics"
      - "{{BaseURL}}/actuator/scheduledtasks"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: beans-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"beans\"") && (contains(body, "\"scope\"") || contains(body, "\"type\"") || contains(body, "\"dependencies\""))'

      - type: dsl
        name: threaddump-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"threads\"") && contains(body, "\"threadState\"")'

      - type: dsl
        name: loggers-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"loggers\"") && (contains(body, "\"configuredLevel\"") || contains(body, "\"effectiveLevel\""))'

      - type: dsl
        name: metrics-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"names\"") && (contains(body, "jvm.memory") || contains(body, "http.server") || contains(body, "system.cpu"))'

    extractors:
      - type: kval
        name: spring-version
        kval:
          - X-Application-Context
