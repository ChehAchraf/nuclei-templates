id: bola-idor-rest-graphql-fuzzing

info:
  name: API BOLA/IDOR - RESTful & GraphQL Heuristic Detection
  author: achraf-chehboun
  severity: high
  description: |
    Detects Broken Object Level Authorization (BOLA/IDOR) in RESTful APIs and GraphQL.
    Uses strict matchers requiring JSON content-type (not HTML), meaningful response
    differentials between resource IDs, and PII field detection. Eliminates false
    positives from catch-all routes and generic HTML pages.
  reference:
    - https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:L/A:N
    cvss-score: 7.1
    cwe-id: CWE-639
  metadata:
    max-request: 14
  tags: bola,idor,api-security,rest,graphql,detection-only

http:
  - raw:
      - |
        GET {{BaseURL}}/api/v1/users/1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/users/2 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/users/999999 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: user-endpoint-bola
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200'
          - 'contains(content_type_1, "json") && !contains(content_type_1, "html")'
          - '!contains(body_1, "<html") && !contains(body_1, "<!DOCTYPE") && !contains(body_1, "<head>")'
          - 'len(body_1) > 30 && len(body_2) > 30'
          - 'body_1 != body_2'
          - 'status_code_3 == 404 || status_code_3 == 403 || len(body_3) < len(body_1)'
        condition: and

    extractors:
      - type: regex
        name: pii-fields-leaked
        group: 0
        regex:
          - '(?i)"(?:email|phone|address|ssn|salary|credit_card|password_hash|date_of_birth|social_security)"\s*:\s*"[^"]{1,200}"'

  - raw:
      - |
        GET {{BaseURL}}/api/v1/orders/1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/orders/999999 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: financial-resource-bola
        dsl:
          - 'status_code_1 == 200 && contains(content_type_1, "json") && !contains(content_type_1, "html")'
          - '!contains(body_1, "<html") && !contains(body_1, "<!DOCTYPE")'
          - 'len(body_1) > 50'
          - 'status_code_2 != status_code_1 || len(body_2) != len(body_1)'
        condition: and

  - raw:
      - |
        GET {{BaseURL}}/api/v1/users/1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/users/1 HTTP/1.1
        Host: {{Hostname}}
        X-HTTP-Method-Override: DELETE
        Accept: application/json

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: method-override-accepted
        dsl:
          - 'status_code_1 == 200 && contains(content_type_1, "json")'
          - '!contains(body_1, "<html")'
          - '(status_code_2 != status_code_1 || body_2 != body_1) && status_code_2 != 405 && status_code_2 != 403'
        condition: and

  - raw:
      - |
        POST {{BaseURL}}/graphql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"query":"{ node(id: \"1\") { id ... on User { email name role } } }"}
      - |
        POST {{BaseURL}}/graphql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"query":"{ node(id: \"2\") { id ... on User { email name role } } }"}

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: graphql-node-idor
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200'
          - 'contains(content_type_1, "json")'
          - 'contains(body_1, "\"data\"") && contains(body_2, "\"data\"")'
          - '!contains(body_1, "\"errors\"") && !contains(body_2, "\"errors\"")'
          - '!contains(body_1, "<html")'
          - 'body_1 != body_2'
        condition: and
