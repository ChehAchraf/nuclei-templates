id: atlassian-critical-cve-detection

info:
  name: Atlassian Products Critical CVEs (2023-2025) Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects critical CVEs in Atlassian Confluence and Jira:
    - CVE-2023-22515: Broken access control (setup endpoint re-accessible)
    - CVE-2023-22518: Improper authorization (restore endpoint accessible)
    - CVE-2023-22527: OGNL/SSTI template injection RCE
    All matchers require Confluence/Jira-specific content to prevent false positives.
    Setup and restore checks require actual Confluence form content, not just status 200.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2023-22515
    - https://nvd.nist.gov/vuln/detail/CVE-2023-22518
    - https://nvd.nist.gov/vuln/detail/CVE-2023-22527
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-94
  metadata:
    max-request: 10
  tags: atlassian,confluence,cve-2023-22515,cve-2023-22518,cve-2023-22527,detection-only

http:
  # === CVE-2023-22515: Confluence Broken Access Control ===
  - method: GET
    path:
      - "{{BaseURL}}/setup/setupadministrator.action"
      - "{{BaseURL}}/setup/setupadministrator-start.action"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: cve-2023-22515-setup-accessible
        dsl:
          - 'status_code == 200 && (contains(body, "Set up system administrator") || contains(body, "setupadministrator") || contains(body, "setup-administrator-form"))'

  # CVE-2023-22515: path parameter bypass
  - raw:
      - |
        GET /server-info.action?bootstrapStatusProvider.applicationConfig.setupComplete=false HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers-condition: and
    matchers:
      - type: dsl
        name: cve-2023-22515-param-bypass
        dsl:
          - 'status_code == 200 && contains(body, "Confluence") && (contains(body, "setup") || contains(body, "administrator"))'
          - '!contains(body, "Confluence is currently being set up")'
        condition: and

  # Version fingerprinting for CVE applicability
  - method: GET
    path:
      - "{{BaseURL}}/server-info.action"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "Confluence"
        part: body

    extractors:
      - type: regex
        name: confluence-version
        group: 1
        regex:
          - 'ajs-version-number"\s*content="([^"]+)"'
          - '<meta name="confluence-version" content="([^"]+)"'

  # === CVE-2023-22518: Confluence Improper Authorization ===
  - method: GET
    path:
      - "{{BaseURL}}/json/setup-restore.action"
      - "{{BaseURL}}/json/setup-restore-local.action"

    stop-at-first-match: false
    matchers:
      - type: dsl
        name: cve-2023-22518-restore-accessible
        dsl:
          - 'status_code == 200 && (contains(body, "restore") || contains(body, "Confluence") || contains(body, "backup")) && contains(content_type, "json") || (status_code == 200 && contains(body, "setup-restore"))'

  # === CVE-2023-22527: Confluence SSTI/OGNL Injection ===
  # Uses canary approach to confirm template evaluation
  - raw:
      - |
        POST /template/aui/text-inline.vm HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html

        label=xnlbz%23LET+%24_v%3D267*269+%23END+${_v}qwfkj

    matchers:
      - type: word
        name: cve-2023-22527-ssti-confirmed
        words:
          - "xnlbz71823qwfkj"
        part: body

  # OGNL via GET with canary
  - raw:
      - |
        GET /template/aui/text-inline.vm?label=xnlbz%24{267*269}qwfkj HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: confluence-ognl-eval
        words:
          - "xnlbz71823qwfkj"
        part: body

  # === CONFLUENCE VERSION DETECTION ===
  - method: GET
    path:
      - "{{BaseURL}}/login.action"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "Confluence"
        part: body

    extractors:
      - type: regex
        name: version-from-login
        group: 1
        regex:
          - 'ajs-version-number"\s*content="([^"]+)"'
          - 'poweredby">Atlassian Confluence\s*([0-9]+\.[0-9]+\.[0-9]+)'

  # === JIRA VERSION FINGERPRINTING ===
  - method: GET
    path:
      - "{{BaseURL}}/secure/Dashboard.jspa"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - 'contains(body, "Jira") || contains(body, "JIRA")'
          - 'contains(body, "ajs-version-number") || contains(body, "data-version")'
        condition: and

    extractors:
      - type: regex
        name: jira-version
        group: 1
        regex:
          - 'ajs-version-number"\s*content="([^"]+)"'
          - 'data-version="([^"]+)"'
