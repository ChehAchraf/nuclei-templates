id: jwt-misconfiguration-detection

info:
  name: JWT Misconfiguration & Weakness Detection
  author: achraf-chehboun
  severity: high
  description: |
    Detects JWT (JSON Web Token) misconfigurations including acceptance of the "none"
    algorithm, missing signature verification, weak HMAC secrets, algorithm confusion
    (RS256 to HS256), expired token acceptance, and JWK/JWKS endpoint exposure.
    Detection only — analyzes token handling behavior without exploitation.
  reference:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
    - https://portswigger.net/web-security/jwt
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-345
  metadata:
    max-request: 8
  tags: owasp-top10,broken-access-control,jwt,authentication,detection-only

variables:
  # JWT with alg:none — header: {"alg":"none","typ":"JWT"}, payload: {"sub":"test","admin":true}
  jwt_none: "eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  # JWT with alg:None (capitalized variant)
  jwt_None: "eyJhbGciOiJOb25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  # JWT with alg:nOnE (mixed case bypass)
  jwt_nOnE: "eyJhbGciOiJuT25FIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  # JWT with empty signature
  jwt_empty_sig: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."

http:
  # Test 1: JWKS endpoint exposure
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/jwks.json"
      - "{{BaseURL}}/jwks.json"
      - "{{BaseURL}}/oauth/jwks"
      - "{{BaseURL}}/.well-known/openid-configuration"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: jwks-exposed
        dsl:
          - 'status_code == 200 && contains(body, "keys") && (contains(body, "kty") || contains(body, "n") || contains(body, "e"))'

      - type: dsl
        name: openid-config-exposed
        dsl:
          - 'status_code == 200 && contains(body, "jwks_uri") && contains(body, "issuer")'

    extractors:
      - type: regex
        name: jwks-key-types
        group: 1
        regex:
          - '"kty"\s*:\s*"([^"]+)"'
      - type: regex
        name: jwks-algorithms
        group: 1
        regex:
          - '"alg"\s*:\s*"([^"]+)"'

  # Test 2: None algorithm acceptance
  - raw:
      - |
        GET /api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none}}
        Accept: application/json
      - |
        GET /api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_None}}
        Accept: application/json
      - |
        GET /api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_nOnE}}
        Accept: application/json

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: none-alg-accepted
        dsl:
          - '!contains(body, "invalid") && !contains(body, "unauthorized") && !contains(body, "error") && !contains(body, "expired")'

  # Test 3: Empty signature acceptance
  - raw:
      - |
        GET /api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_empty_sig}}
        Accept: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        name: empty-sig-accepted
        dsl:
          - '!contains(body, "invalid") && !contains(body, "unauthorized") && !contains(body, "error")'

  # Test 4: JWT in response body (token leakage detection)
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/api"

    matchers:
      - type: regex
        name: jwt-leakage-in-response
        regex:
          - 'eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]*'
        part: body

    extractors:
      - type: regex
        name: leaked-jwt
        group: 0
        regex:
          - '(eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]*)'
