id: idor-parameter-tampering-detection

info:
  name: IDOR - Insecure Direct Object Reference Detection
  author: achraf-chehboun
  severity: high
  description: |
    Detects potential Insecure Direct Object Reference (IDOR) vulnerabilities by
    testing sequential ID enumeration and response differential analysis on common
    REST API patterns. Uses strict matchers requiring JSON content-type, meaningful
    data fields, and response differentials to minimize false positives.
  reference:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 6.5
    cwe-id: CWE-639
  metadata:
    max-request: 10
  tags: owasp-top10,broken-access-control,idor,authorization,detection-only

http:
  - raw:
      - |
        GET {{BaseURL}}/api/users/1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/users/2 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: sequential-id-accessible
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200'
          - 'contains(content_type_1, "json") && contains(content_type_2, "json")'
          - '!contains(content_type_1, "html") && !contains(content_type_2, "html")'
          - '!contains(body_1, "<html") && !contains(body_1, "<!DOCTYPE") && !contains(body_1, "<head>")'
          - 'len(body_1) > 30 && len(body_2) > 30'
          - 'body_1 != body_2'
        condition: and

    extractors:
      - type: regex
        name: exposed-pii-fields
        group: 0
        regex:
          - '(?i)"(?:email|phone|address|ssn|salary|credit_card|password|date_of_birth)"\s*:\s*"[^"]{1,200}"'

  - raw:
      - |
        GET {{BaseURL}}/api/v1/users/1 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json
      - |
        GET {{BaseURL}}/api/v1/users/2 HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200'
          - 'contains(content_type_1, "json") && contains(content_type_2, "json")'
          - '!contains(body_1, "<html") && !contains(body_1, "<!DOCTYPE")'
          - 'len(body_1) > 30 && len(body_2) > 30'
          - 'body_1 != body_2'
        condition: and

  - raw:
      - |
        POST {{BaseURL}}/graphql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"query":"{ user(id: 1) { id email name } }"}
      - |
        POST {{BaseURL}}/graphql HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json

        {"query":"{ user(id: 2) { id email name } }"}

    req-condition: true
    matchers-condition: and
    matchers:
      - type: dsl
        name: graphql-idor
        dsl:
          - 'status_code_1 == 200 && status_code_2 == 200'
          - 'contains(content_type_1, "json") && contains(content_type_2, "json")'
          - 'contains(body_1, "\"data\"") && contains(body_2, "\"data\"")'
          - '!contains(body_1, "\"errors\"") && !contains(body_2, "\"errors\"")'
          - 'body_1 != body_2'
        condition: and
